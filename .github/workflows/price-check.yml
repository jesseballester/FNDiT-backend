name: FNDiT Daily Price Check

on:
  schedule:
    - cron: "5 7 * * *"
  workflow_dispatch: {}

jobs:
  run-price-check:
    runs-on: ubuntu-latest

    steps:
      - name: Call FNDiT price checker
        id: call
        env:
          PRICE_CHECK_URL: ${{ secrets.PRICE_CHECK_URL }}
          CHECK_SECRET: ${{ secrets.CHECK_SECRET }}
        run: |
          echo "Calling price checker..."
          RESPONSE=$(curl -sS -f "${PRICE_CHECK_URL}?secret=${CHECK_SECRET}")
          echo "$RESPONSE"
          echo "response=$RESPONSE" >> $GITHUB_OUTPUT

      - name: Extract drops count
        id: parse
        run: |
          echo '${{ steps.call.outputs.response }}' > response.json
          DROPS=$(jq '.drops' response.json)
          CHECKED=$(jq '.checked' response.json)
          UPDATED=$(jq '.updated' response.json)
          echo "drops=$DROPS" >> $GITHUB_OUTPUT
          echo "checked=$CHECKED" >> $GITHUB_OUTPUT
          echo "updated=$UPDATED" >> $GITHUB_OUTPUT
          echo "Drops: $DROPS | Checked: $CHECKED | Updated: $UPDATED"

      - name: Send email if drops > 0
        if: steps.parse.outputs.drops != '0'
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          TO_EMAIL: ${{ secrets.ALERT_EMAIL_TO }}
          FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
        run: |
          curl --request POST \
            --url https://api.sendgrid.com/v3/mail/send \
            --header "Authorization: Bearer $SENDGRID_API_KEY" \
            --header "Content-Type: application/json" \
            --data "{
              \"personalizations\": [{\"to\": [{\"email\": \"$TO_EMAIL\"}]}],
              \"from\": {\"email\": \"$FROM_EMAIL\"},
              \"subject\": \"FNDiT Price Drop Alert\",
              \"content\": [{
                \"type\": \"text/plain\",
                \"value\": \"FNDiT detected a price drop. Check your tracked items.\"
              }]
            }"
